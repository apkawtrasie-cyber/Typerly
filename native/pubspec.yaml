name: typerly
description: Typerly - Modern social sports prediction app with friends
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.3.4
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Network
  http: ^1.1.2
  dio: ^5.4.0
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Utilities
  uuid: ^4.3.1
  intl: ^0.18.1
  collection: ^1.18.0
  
  # AdMob
  google_mobile_ads: ^4.0.0
  
  # Charts
  fl_chart: ^0.66.0

  # Image picker (upload logo drużyny z galerii)
  image_picker: ^1.1.2

  # Sharing
  share_plus: ^10.0.0

  # Animacje Lottie + konfetti
  lottie: ^3.1.0
  confetti: ^0.7.0

  # QR kod
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/icons/typerly_icon.png
    - assets/icons/sports/
    - assets/icons/ui/
    - assets/icons/flags/
    - assets/images/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/typerly_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/typerly_icon.png"
  remove_alpha_ios: true
